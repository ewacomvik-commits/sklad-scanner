<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сканер QR для склада</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 400px;
        }
        .scan-button {
            background-color: #2AABEE;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s;
            margin-bottom: 20px;
        }
        .scan-button:hover {
            background-color: #229ED9;
        }
        .scan-button:active {
            transform: scale(0.98);
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: white;
            color: #333;
            font-size: 14px;
            min-height: 40px;
            white-space: pre-line;
            text-align: left;
        }
        .status.error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #c62828;
        }
        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
        }
        .status.info {
            background: #e3f2fd;
            color: #0d47a1;
            border-left: 4px solid #0d47a1;
        }
        .version-info {
            margin-top: 20px;
            padding: 10px;
            font-size: 12px;
            color: #666;
            background: #f0f0f0;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="scan-button" onclick="window.startScan()">
            📱 Сканировать QR
        </button>
        
        <div class="version-info" id="versionDisplay">
            Проверка версии Telegram...
        </div>
        
        <div class="status" id="status">
            Готов к сканированию
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js?1"></script>
    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Функция для отображения статуса
        function setStatus(text, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = text;
            statusDiv.className = `status ${type}`;
        }

        function setVersionInfo(text) {
            document.getElementById('versionDisplay').textContent = text;
        }

        // Проверка версии и инициализация
        async function initApp() {
            try {
                const version = tg.version;
                console.log('Telegram version:', version);
                setVersionInfo(`Версия Telegram API: ${version}`);

                // Проверяем минимальную версию (6.4 для showScanQrPopup)
                if (tg.version < '6.4') {
                    setStatus(
                        '❌ Ваша версия Telegram устарела.\n' +
                        `Текущая версия: ${version}\n` +
                        'Пожалуйста, обновите Telegram из официального источника:\n' +
                        'telegram.org/android (для Android)\n' +
                        'Или используйте App Store (для iPhone)',
                        'error'
                    );
                    return false;
                }

                setStatus('✅ Версия поддерживается. Можно сканировать.', 'success');
                return true;
                
            } catch (error) {
                console.error('Ошибка инициализации:', error);
                setStatus('❌ Ошибка подключения к Telegram', 'error');
                return false;
            }
        }

        // Функция сканирования
        window.startScan = async function() {
            const statusDiv = document.getElementById('status');
            
            try {
                // Проверяем версию перед сканированием
                if (tg.version < '6.4') {
                    setStatus(
                        '❌ Сканирование недоступно. Обновите Telegram.\n' +
                        'telegram.org/android',
                        'error'
                    );
                    return;
                }

                setStatus('🔄 Открываю сканер...', 'info');
                
                // Используем стандартный метод showScanQrPopup
                tg.showScanQrPopup({
                    text: 'Наведите камеру на QR-код этикетки'
                }, (scannedText) => {
                    if (scannedText) {
                        console.log('Отсканировано:', scannedText);
                        setStatus('✅ QR считан, отправляю данные...', 'success');
                        
                        // Отправляем данные в бота
                        tg.sendData(scannedText);
                        
                        // Закрываем сканер и Mini App
                        return true;
                    }
                });
                
            } catch (error) {
                console.error('Ошибка сканирования:', error);
                
                // Обрабатываем ошибку
                if (error.message?.includes('permission')) {
                    setStatus(
                        '❌ Нет доступа к камере.\n' +
                        'Проверьте настройки Telegram:\n' +
                        'Настройки → Приложения → Telegram → Разрешения → Камера → Разрешить',
                        'error'
                    );
                } else if (error.message?.includes('unsupported')) {
                    setStatus(
                        '❌ Сканирование не поддерживается.\n' +
                        'Используйте мобильное приложение Telegram.',
                        'error'
                    );
                } else {
                    setStatus(`❌ Ошибка: ${error.message}`, 'error');
                }
            }
        };

        // Запускаем проверку при загрузке
        initApp();

        // Добавляем кнопку для тестовой отправки
        const testButton = document.createElement('button');
        testButton.textContent = '📤 Тест отправки';
        testButton.style.cssText = `
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        `;
        testButton.onclick = function() {
            const testData = "TEST:Привет от Mini App";
            console.log("Отправляю тест:", testData);
            tg.sendData(testData);
            setStatus("✅ Тестовые данные отправлены!", "success");
        };
        document.querySelector('.container').appendChild(testButton);
        
    </script>
</body>
</html>
