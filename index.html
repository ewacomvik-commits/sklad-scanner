<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сканер QR для склада</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 400px;
        }
        .scan-button {
            background-color: #2AABEE;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s;
        }
        .scan-button:hover {
            background-color: #229ED9;
        }
        .scan-button:active {
            transform: scale(0.98);
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            background: white;
            color: #333;
            font-size: 14px;
            min-height: 20px;
        }
        .info {
            margin-bottom: 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="info">
            Нажмите кнопку и отсканируйте QR-код на этикетке
        </div>
        
        <button class="scan-button" onclick="startScan()">
            📱 Сканировать QR
        </button>
        
        <div class="status" id="status">
            Готов к сканированию
        </div>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Разворачиваем на весь экран
        
        // Показываем, что Mini App принадлежит боту
        tg.MainButton.setText('Отправить').show();
        tg.MainButton.hide(); // Скрываем, но оставляем привязку

        function startScan() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '🔄 Открываю сканер...';
            
            // Открываем нативный сканер Telegram
            tg.showScanQrPopup({
                text: 'Наведите камеру на QR-код этикетки'
            }, (scannedText) => {
                // Это срабатывает после успешного сканирования
                console.log('Отсканировано:', scannedText);
                
                statusDiv.innerHTML = '✅ QR считан, отправляю данные...';
                
                // Отправляем данные в бота
                tg.sendData(scannedText);
                
                // Закрываем Mini App
                tg.close();
                
                // Закрываем сканер (возвращаем true)
                return true;
            });
        }
    </script>
</body>
</html>
