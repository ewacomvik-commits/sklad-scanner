<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сканер QR для склада</title>
    <script src="https://telegram.org/js/telegram-web-app.js?1"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 400px;
        }
        .scan-button {
            background-color: #2AABEE;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s;
        }
        .scan-button:hover {
            background-color: #229ED9;
        }
        .scan-button:active {
            transform: scale(0.98);
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            background: white;
            color: #333;
            font-size: 14px;
            min-height: 20px;
        }
        .info {
            margin-bottom: 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="info">
            Нажмите кнопку и отсканируйте QR-код на этикетке
        </div>
        
        <button class="scan-button" onclick="startScan()">
            📱 Сканировать QR
        </button>
        
        <div class="status" id="status">
            Готов к сканированию
        </div>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        console.log("Telegram WebApp initialized", tg.initData);
        
        tg.ready();
        tg.expand();
        
        // Пробуем отправить тестовое сообщение при загрузке
        try {
            tg.sendData("test_connection");
            console.log("✅ Тестовое сообщение отправлено");
            document.getElementById('status').innerHTML = '✅ Тест отправлен';
        } catch (e) {
            console.error("❌ Ошибка отправки теста:", e);
            document.getElementById('status').innerHTML = '❌ Ошибка: ' + e.message;
        }
        
        tg.MainButton.setText('Сканировать').show();
        tg.MainButton.hide();

        function startScan() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '🔄 Открываю сканер...';
            
            try {
                tg.showScanQrPopup({
                    text: 'Наведите камеру на QR-код этикетки'
                }, (scannedText) => {
                    console.log('Отсканировано:', scannedText);
                    statusDiv.innerHTML = '✅ QR считан, отправляю данные...';
                    
                    tg.sendData(scannedText);
                    tg.close();
                    return true;
                });
            } catch (error) {
                statusDiv.innerHTML = '❌ Ошибка: ' + error.message;
                console.error(error);
            }
        }
    </script>
</body>
</html>
